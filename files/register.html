<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — JA Today</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --green:#00a651; --gold:#fed100; --glass:rgba(255,255,255,0.07); --glass-border:rgba(255,255,255,0.13); --text:#f0ede8; --muted:rgba(240,237,232,0.5); --red:#e74c3c; }
  *, *::before, *::after { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:#0d0f13; color:var(--text); min-height:100vh; display:flex; flex-direction:column; }

  .bg {
    position:fixed; inset:0; z-index:0; pointer-events:none;
    background:
      radial-gradient(ellipse 70% 60% at 15% 20%, rgba(0,166,81,0.2) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 85% 75%, rgba(254,209,0,0.1) 0%, transparent 55%),
      #0d0f13;
  }

  .page { position:relative; z-index:1; flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; padding:2rem 1rem; }

  .logo { font-family:'Bebas Neue',sans-serif; font-size:2.5rem; letter-spacing:0.1em; text-decoration:none; color:var(--text); margin-bottom:0.25rem; }
  .logo .ja { color:var(--gold); }
  .logo-sub { font-family:'JetBrains Mono',monospace; font-size:0.6rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-bottom:2rem; text-align:center; }

  .card {
    width:100%; max-width:400px;
    background:rgba(20,22,26,0.7); border:1px solid var(--glass-border); border-radius:18px;
    padding:2rem; backdrop-filter:blur(20px);
  }

  .card h2 { font-family:'DM Serif Display',serif; font-size:1.6rem; font-weight:400; margin-bottom:0.25rem; }
  .card p  { font-size:0.82rem; color:var(--muted); margin-bottom:1.5rem; }

  .field { margin-bottom:1.1rem; }
  .field label { display:block; font-family:'JetBrains Mono',monospace; font-size:0.6rem; letter-spacing:0.12em; text-transform:uppercase; color:var(--muted); margin-bottom:0.35rem; }
  .field input {
    width:100%; padding:0.6rem 0.9rem;
    background:var(--glass); border:1px solid var(--glass-border); border-radius:10px;
    color:var(--text); font-family:'DM Sans',sans-serif; font-size:0.9rem; outline:none;
    transition:border-color 0.18s;
  }
  .field input:focus { border-color:var(--green); }
  .field input::placeholder { color:var(--muted); }

  .error { font-family:'JetBrains Mono',monospace; font-size:0.65rem; color:var(--red); margin-bottom:1rem; display:none; }

  .submit-btn {
    width:100%; padding:0.7rem; border:none; border-radius:100px;
    background:var(--green); color:#fff;
    font-family:'JetBrains Mono',monospace; font-size:0.72rem; letter-spacing:0.12em; text-transform:uppercase;
    cursor:pointer; transition:background 0.18s; margin-top:0.5rem;
  }
  .submit-btn:hover { background:#009044; }

  .alt-link { text-align:center; margin-top:1.2rem; font-size:0.8rem; color:var(--muted); }
  .alt-link a { color:var(--green); text-decoration:none; }
  .alt-link a:hover { text-decoration:underline; }

  .back { margin-top:1.5rem; }
  .back a { font-family:'JetBrains Mono',monospace; font-size:0.62rem; letter-spacing:0.1em; text-transform:uppercase; color:var(--muted); text-decoration:none; transition:color 0.15s; }
  .back a:hover { color:var(--text); }
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">
  <a class="logo" href="ja-today.html"><span class="ja">JA</span> TODAY</a>
  <div class="logo-sub">Create your account</div>

  <div class="card">
    <h2>Register</h2>
    <p>Join JA Today to subscribe to journalists and personalise your feed.</p>

    <div class="error" id="error-msg"></div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" id="f-name" placeholder="Your name">
    </div>
    <div class="field">
      <label>Email Address</label>
      <input type="email" id="f-email" placeholder="you@email.com">
    </div>
    <div class="field">
      <label>Password</label>
      <input type="password" id="f-pass" placeholder="Min. 6 characters">
    </div>
    <div class="field">
      <label>Confirm Password</label>
      <input type="password" id="f-pass2" placeholder="Repeat password">
    </div>

    <button class="submit-btn" onclick="register()">Create Account</button>

    <div class="alt-link">Already have an account? <a href="login.html">Log in</a></div>
  </div>

  <div class="back"><a href="ja-today.html">← Back to JA Today</a></div>
</div>

<script>
const USERS_KEY = 'ja-today-users';
const AUTH_KEY  = 'ja-today-session';

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg; el.style.display = 'block';
}

function register() {
  const name  = document.getElementById('f-name').value.trim();
  const email = document.getElementById('f-email').value.trim().toLowerCase();
  const pass  = document.getElementById('f-pass').value;
  const pass2 = document.getElementById('f-pass2').value;

  if (!name)              return showError('Please enter your name.');
  if (!email.includes('@')) return showError('Please enter a valid email.');
  if (pass.length < 6)   return showError('Password must be at least 6 characters.');
  if (pass !== pass2)    return showError('Passwords do not match.');

  let users = [];
  try { users = JSON.parse(localStorage.getItem(USERS_KEY)) || []; } catch(_) {}

  if (users.find(u => u.email === email)) return showError('An account with that email already exists.');

  users.push({ name, email, pass });
  localStorage.setItem(USERS_KEY, JSON.stringify(users));

  // Auto-login
  localStorage.setItem(AUTH_KEY, JSON.stringify({ name, email }));
  window.location.href = 'ja-today.html';
}

// Allow Enter key
document.addEventListener('keydown', e => { if (e.key === 'Enter') register(); });
</script>
</body>
</html>
