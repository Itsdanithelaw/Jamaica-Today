<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JA Today — Jamaica's Daily News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00a651;
    --gold:  #fed100;
    --glass: rgba(255,255,255,0.07);
    --glass-border: rgba(255,255,255,0.13);
    --glass-hover:  rgba(255,255,255,0.12);
    --text:  #f0ede8;
    --muted: rgba(240,237,232,0.5);
    --card-bg: rgba(20,22,26,0.65);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: #0d0f13;
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* BG */
  .bg {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%, rgba(0,166,81,0.18) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(254,209,0,0.10) 0%, transparent 55%),
      #0d0f13;
  }

  .page { position: relative; z-index: 1; }

  /* TICKER */
  .ticker { background: var(--green); overflow: hidden; height: 30px; display: flex; align-items: center; }
  .ticker-label {
    background: var(--gold); color: #000; padding: 0 1rem; height: 100%;
    display: flex; align-items: center;
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase; white-space: nowrap; flex-shrink: 0;
  }
  .ticker-scroll { display: flex; animation: scroll-ticker 30s linear infinite; white-space: nowrap; }
  .ticker-item { font-family: 'JetBrains Mono', monospace; font-size: 0.63rem; letter-spacing: 0.05em; color: #fff; padding: 0 2.5rem; }
  @keyframes scroll-ticker { 0% { transform: translateX(0); } 100% { transform: translateX(-50%); } }

  /* HEADER */
  header {
    padding: 0 2rem;
    border-bottom: 1px solid var(--glass-border);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    background: rgba(13,15,19,0.75);
    position: sticky; top: 0; z-index: 50;
  }

  .header-inner { max-width: 760px; margin: 0 auto; }

  .header-top {
    display: flex; justify-content: space-between; align-items: center;
    padding: 0.5rem 0; border-bottom: 1px solid var(--glass-border);
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; color: var(--muted); letter-spacing: 0.08em;
  }

  .header-flag { display: flex; gap: 2px; align-items: center; }
  .flag-bar { width: 3px; height: 12px; border-radius: 1px; }

  .wordmark { text-align: center; padding: 0.9rem 0 0.3rem; }
  .wordmark h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.2rem, 8vw, 6rem);
    line-height: 1; letter-spacing: 0.08em; display: inline-flex; align-items: baseline; gap: 0.05em;
  }
  .wordmark h1 .ja { color: var(--gold); text-shadow: 0 0 40px rgba(254,209,0,0.4); }
  .wordmark h1 .today { color: var(--text); }
  .wordmark-rule {
    height: 3px;
    background: linear-gradient(90deg, #111 33%, var(--gold) 33% 66%, var(--green) 66%);
    margin: 0.3rem auto 0; width: 55%; border-radius: 1px;
  }
  .wordmark-sub {
    font-family: 'Syne', sans-serif; font-size: 0.63rem; font-weight: 400;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem;
  }

  /* CAT NAV */
  .cat-nav-wrap {
    overflow-x: auto; scrollbar-width: none; display: flex;
    padding: 0.6rem 0 0.5rem; gap: 0.4rem;
  }
  .cat-nav-wrap::-webkit-scrollbar { display: none; }

  .cat-btn {
    background: var(--glass); border: 1px solid var(--glass-border); color: var(--muted);
    padding: 0.3rem 0.9rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.1em; text-transform: uppercase;
    cursor: pointer; border-radius: 100px; white-space: nowrap; transition: all 0.18s; flex-shrink: 0;
    backdrop-filter: blur(10px);
  }
  .cat-btn:hover { background: var(--glass-hover); color: var(--text); }
  .cat-btn.active { background: var(--green); border-color: var(--green); color: #fff; }

  /* SEARCH */
  .search-wrap {
    padding: 0.75rem 2rem;
    display: flex; justify-content: center;
    border-bottom: 1px solid var(--glass-border);
    background: rgba(13,15,19,0.4); backdrop-filter: blur(10px);
  }
  .search-input {
    width: 100%; max-width: 500px;
    padding: 0.5rem 1.1rem;
    background: var(--glass); border: 1px solid var(--glass-border); border-radius: 100px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 0.85rem; outline: none;
    backdrop-filter: blur(10px); transition: border-color 0.18s, background 0.18s;
  }
  .search-input::placeholder { color: var(--muted); }
  .search-input:focus { border-color: var(--green); background: var(--glass-hover); }

  /* FEED */
  .feed {
    max-width: 760px; margin: 0 auto;
    padding: 2rem 2rem 4rem;
    display: flex; flex-direction: column; gap: 1.5rem;
  }

  /* CARD */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--glass-border);
    border-radius: 16px;
    overflow: hidden;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    transition: transform 0.22s ease, border-color 0.22s, box-shadow 0.22s;
    animation: card-in 0.4s ease both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(255,255,255,0.22);
    box-shadow: 0 20px 60px rgba(0,0,0,0.45), 0 0 0 1px rgba(0,166,81,0.2);
  }

  .card a { text-decoration: none; color: inherit; display: block; }

  /* title area */
  .card-title-area { padding: 1.3rem 1.4rem 0.8rem; }

  .card-cat {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; font-weight: 500;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--green);
    margin-bottom: 0.5rem; display: flex; align-items: center; gap: 0.4rem;
  }
  .card-cat::before {
    content: ''; display: inline-block; width: 6px; height: 6px;
    border-radius: 50%; background: var(--green);
  }

  .card-title {
    font-family: 'DM Serif Display', Georgia, serif;
    font-size: clamp(1.2rem, 3vw, 1.5rem);
    font-weight: 400; line-height: 1.25; color: var(--text);
  }

  /* image */
  .card-image-wrap {
    margin: 0 1.4rem; border-radius: 10px; overflow: hidden; position: relative;
  }
  .card-img {
    width: 100%; aspect-ratio: 16/8; object-fit: cover; display: block;
    transition: transform 0.4s ease;
  }
  .card:hover .card-img { transform: scale(1.03); }

  .card-img-placeholder {
    width: 100%; aspect-ratio: 16/8;
    background: linear-gradient(135deg, rgba(0,166,81,0.18) 0%, rgba(254,209,0,0.07) 100%);
    display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative;
  }
  .card-img-placeholder::after {
    content: 'JA TODAY';
    font-family: 'Bebas Neue', sans-serif; font-size: 3rem; letter-spacing: 0.2em;
    color: rgba(255,255,255,0.05);
  }

  /* body */
  .card-body { padding: 0.9rem 1.4rem 1.1rem; display: flex; flex-direction: column; gap: 0.7rem; }

  .card-excerpt {
    font-size: 0.88rem; line-height: 1.65; color: rgba(240,237,232,0.7);
    font-weight: 300;
    display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
  }

  /* footer */
  .card-footer {
    display: flex; align-items: center; justify-content: space-between;
    padding-top: 0.6rem; border-top: 1px solid var(--glass-border); gap: 0.75rem; flex-wrap: wrap;
  }
  .card-meta {
    display: flex; align-items: center; gap: 0.7rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; color: var(--muted); letter-spacing: 0.05em;
  }
  .card-source { color: var(--gold); font-weight: 500; }
  .card-date::before { content: '· '; opacity: 0.4; }
  .card-read {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--green);
    display: flex; align-items: center; gap: 0.3rem; transition: gap 0.15s;
  }
  .card:hover .card-read { gap: 0.55rem; }

  /* LOOP DIVIDER */
  .loop-divider {
    text-align: center;
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: rgba(240,237,232,0.2); padding: 0.25rem 0;
  }

  /* LOADER */
  .loader {
    text-align: center; padding: 2rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em;
    text-transform: uppercase; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 0.75rem;
  }
  .loader-dots { display: flex; gap: 4px; }
  .loader-dots span {
    width: 5px; height: 5px; border-radius: 50%; background: var(--green);
    animation: blink 1.2s ease infinite both;
  }
  .loader-dots span:nth-child(2) { animation-delay: 0.2s; }
  .loader-dots span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.15; transform: scale(0.85); }
    40%            { opacity: 1;   transform: scale(1.1); }
  }

  /* EMPTY */
  .empty { text-align: center; padding: 6rem 2rem; color: var(--muted); }
  .empty h2 { font-family: 'DM Serif Display', serif; font-size: 2rem; color: var(--text); margin-bottom: 0.5rem; }
  .empty p  { font-size: 0.9rem; font-style: italic; }

  /* FOOTER */
  .site-footer {
    background: rgba(8,8,8,0.85); border-top: 1px solid var(--glass-border);
    text-align: center; padding: 2rem;
    font-family: 'JetBrains Mono', monospace; font-size: 0.62rem; letter-spacing: 0.08em;
    color: var(--muted); backdrop-filter: blur(20px);
  }
  .site-footer .footer-logo {
    font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.1em;
    color: var(--text); margin-bottom: 0.4rem;
  }
  .site-footer .footer-logo .ja { color: var(--gold); }

  /* AUTH BUTTONS */
  .auth-area { display: flex; align-items: center; gap: 0.5rem; }

  .auth-btn {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
    text-transform: uppercase; padding: 0.28rem 0.75rem; border-radius: 100px;
    cursor: pointer; text-decoration: none; transition: all 0.18s; white-space: nowrap;
    border: 1px solid var(--glass-border); background: var(--glass); color: var(--muted);
  }
  .auth-btn:hover { background: var(--glass-hover); color: var(--text); }
  .auth-btn.primary { background: var(--green); border-color: var(--green); color: #fff; }
  .auth-btn.primary:hover { background: #009044; }

  .auth-user {
    font-family: 'JetBrains Mono', monospace; font-size: 0.6rem; letter-spacing: 0.06em;
    color: var(--gold); display: flex; align-items: center; gap: 0.5rem;
  }

  @media (max-width: 600px) {
    .feed { padding: 1.2rem 1rem 3rem; }
    header { padding: 0 1rem; }
    .search-wrap { padding: 0.6rem 1rem; }
  }
</style>
</head>
<body>
<div class="bg"></div>
<div class="page">

  <div class="ticker">
    <div class="ticker-label">Breaking</div>
    <div class="ticker-scroll" id="ticker-scroll"></div>
  </div>

  <header>
    <div class="header-inner">
      <div class="header-top">
        <div class="header-flag">
          <div class="flag-bar" style="background:#000;"></div>
          <div class="flag-bar" style="background:var(--gold);"></div>
          <div class="flag-bar" style="background:var(--green);"></div>
        </div>
        <span id="date-display"></span>
        <div class="auth-area" id="auth-area"></div>
      </div>
      <div class="wordmark">
        <h1><span class="ja">JA</span><span class="today"> TODAY</span></h1>
        <div class="wordmark-rule"></div>
        <div class="wordmark-sub">Jamaica's Daily News</div>
      </div>
      <div class="cat-nav-wrap" id="cat-nav"></div>
    </div>
  </header>

  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="🔍  Search stories..." oninput="handleSearch(this.value)">
  </div>

  <div class="feed" id="feed"></div>

  <div class="loader" id="loader" style="display:none;">
    <div class="loader-dots"><span></span><span></span><span></span></div>
    Loading more stories
  </div>

  <footer class="site-footer">
    <div class="footer-logo"><span class="ja">JA</span> TODAY</div>
    <div>Jamaica's Daily News &nbsp;·&nbsp; <span id="footer-year"></span></div>
  </footer>

</div>

<script>
const STORE_KEY = 'newsdesk-articles';
const PAGE_SIZE = 8;

let allArticles    = [];
let filtered       = [];
let activeCategory = 'all';
let searchQuery    = '';
let pageIndex      = 0;
let isLoading      = false;

async function init() {
  document.getElementById('date-display').textContent =
    new Date().toLocaleDateString('en-JM', { weekday:'long', year:'numeric', month:'long', day:'numeric' }).toUpperCase();
  document.getElementById('footer-year').textContent = new Date().getFullYear();

  await loadArticles();
  applyFilters();
  buildCatNav();
  renderFeed(true);
  buildTicker();
  setupScroll();
  renderAuthArea();
}

async function loadArticles() {
  try {
    const r = await window.storage.get(STORE_KEY);
    if (r && r.value) allArticles = JSON.parse(r.value);
  } catch(_) {
    try { const raw = localStorage.getItem(STORE_KEY); if (raw) allArticles = JSON.parse(raw); } catch(__) {}
  }

  // Inject test card if feed is empty
  if (!allArticles.length) {
    allArticles = [{
      title:   'Blue Mountains Coffee Farmers Celebrate Record Harvest Season',
      excerpt: 'Farmers across the Blue Mountains region are reporting the best coffee yield in over a decade, driven by favorable rainfall patterns and improved cultivation techniques adopted in partnership with the Jamaica Agricultural Society.',
      category:'Agriculture',
      source:  'JA Today Test',
      author:  'Staff Reporter',
      image:   'https://images.unsplash.com/photo-1447933601403-0c6688de566e?w=800&q=80',
      date:    new Date().toISOString().split('T')[0],
      url:     '',
      body:    'Farmers across the Blue Mountains region are reporting the best coffee yield in over a decade, driven by favorable rainfall patterns and improved cultivation techniques adopted in partnership with the Jamaica Agricultural Society.\n\nThe harvest, which began in October and runs through February, has seen production volumes increase by nearly 40% compared to the previous year. Industry leaders say this is a turning point for Jamaica\'s premium coffee export market, which has long been dominated by Japanese buyers.\n\n"This is the best season we have seen in many years," said one veteran farmer based in Mavis Bank. "The rains came at exactly the right time and the beans are exceptional quality."\n\nThe Jamaica Agricultural Society plans to host a regional coffee festival later in the year to showcase the harvest and attract new international buyers.',
    }];
  }

  allArticles.sort((a,b) => new Date(b.date||0) - new Date(a.date||0));
}

function applyFilters() {
  filtered = allArticles.filter(a => {
    const catOk  = activeCategory === 'all' || (a.category||'').toLowerCase() === activeCategory.toLowerCase();
    const srchOk = !searchQuery ||
      (a.title||'').toLowerCase().includes(searchQuery) ||
      (a.excerpt||'').toLowerCase().includes(searchQuery) ||
      (a.source||'').toLowerCase().includes(searchQuery);
    return catOk && srchOk;
  });
  pageIndex = 0;
}

function handleSearch(val) {
  searchQuery = val.toLowerCase().trim();
  applyFilters();
  document.getElementById('feed').innerHTML = '';
  renderFeed(true);
}

function buildCatNav() {
  const cats = [...new Set(allArticles.map(a => a.category).filter(Boolean))];
  const nav = document.getElementById('cat-nav');
  nav.innerHTML = `<button class="cat-btn active" onclick="filterCat('all',this)">All</button>`;
  cats.forEach(c => {
    const b = document.createElement('button');
    b.className = 'cat-btn';
    b.textContent = c;
    b.onclick = function(){ filterCat(c, this); };
    nav.appendChild(b);
  });
}

function filterCat(cat, btn) {
  activeCategory = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyFilters();
  document.getElementById('feed').innerHTML = '';
  renderFeed(true);
}

function getNextBatch() {
  if (!filtered.length) return [];
  const batch = [];
  for (let i = 0; i < PAGE_SIZE; i++) {
    const absIdx = pageIndex + i;
    const loopStart = absIdx > 0 && absIdx % filtered.length === 0;
    const artIdx = absIdx % filtered.length;
    batch.push({ article: filtered[artIdx], loopStart });
  }
  pageIndex += PAGE_SIZE;
  return batch;
}

function renderFeed(reset = false) {
  const feed = document.getElementById('feed');

  if (reset && filtered.length === 0) {
    feed.innerHTML = `<div class="empty"><h2>No stories right now.</h2><p>Check back soon — new stories drop daily.</p></div>`;
    return;
  }

  const batch = getNextBatch();
  batch.forEach(({ article: a, loopStart }, i) => {
    if (loopStart) {
      const d = document.createElement('div');
      d.className = 'loop-divider';
      d.textContent = '· · · continuing from the top · · ·';
      feed.appendChild(d);
    }
    const card = buildCard(a, reset ? i : 99);
    feed.appendChild(card);
  });
}

function buildCard(a, animIdx) {
  const card = document.createElement('div');
  card.className = 'card';
  card.style.animationDelay = `${Math.min(animIdx, 5) * 0.07}s`;

  // Encode article data in URL so article.html can read it
  const encoded = encodeURIComponent(JSON.stringify(a));
  const wrap  = `<a href="article.html?data=${encoded}">`;
  const wrapE = `</a>`;

  const imgHTML = a.image
    ? `<div class="card-image-wrap"><img class="card-img" src="${esc(a.image)}" alt="" loading="lazy" onerror="this.parentNode.innerHTML='<div class=card-img-placeholder></div>'"></div>`
    : `<div class="card-image-wrap"><div class="card-img-placeholder"></div></div>`;

  const footer = `
    <div class="card-footer">
      <div class="card-meta">
        ${a.source ? `<span class="card-source">${esc(a.source)}</span>` : ''}
        <span class="card-date">${fmtDate(a.date)}</span>
      </div>
      <span class="card-read">Read story →</span>
    </div>`;

  card.innerHTML = `
    ${wrap}
      <div class="card-title-area">
        ${a.category ? `<div class="card-cat">${esc(a.category)}</div>` : ''}
        <div class="card-title">${esc(a.title)}</div>
      </div>
      ${imgHTML}
      <div class="card-body">
        ${a.excerpt ? `<div class="card-excerpt">${esc(a.excerpt)}</div>` : ''}
        ${footer}
      </div>
    ${wrapE}`;

  return card;
}

// ── AUTH ──
const AUTH_KEY = 'ja-today-session';
const USERS_KEY = 'ja-today-users';

function getSession() {
  try { return JSON.parse(localStorage.getItem(AUTH_KEY)); } catch(_) { return null; }
}

function renderAuthArea() {
  const session = getSession();
  const area = document.getElementById('auth-area');
  if (session) {
    area.innerHTML = `
      <span class="auth-user">👤 ${esc(session.name)}</span>
      <button class="auth-btn" onclick="logout()">Logout</button>`;
  } else {
    area.innerHTML = `
      <a class="auth-btn" href="login.html">Login</a>
      <a class="auth-btn primary" href="register.html">Register</a>`;
  }
}

function logout() {
  localStorage.removeItem(AUTH_KEY);
  renderAuthArea();
}

function buildTicker() {
  const el = document.getElementById('ticker-scroll');
  if (!allArticles.length) {
    el.innerHTML = '<span class="ticker-item">Stay tuned for today\'s stories</span>';
    return;
  }
  const titles = allArticles.slice(0, 10).map(a => a.title);
  const doubled = [...titles, ...titles];
  el.innerHTML = doubled.map(t => `<span class="ticker-item">▸ ${esc(t)}</span>`).join('');
}

function setupScroll() {
  const loader   = document.getElementById('loader');
  const sentinel = document.createElement('div');
  sentinel.style.height = '1px';
  document.querySelector('.site-footer').before(sentinel);

  new IntersectionObserver(entries => {
    if (entries[0].isIntersecting && !isLoading && filtered.length > 0) {
      isLoading = true;
      loader.style.display = 'flex';
      setTimeout(() => {
        renderFeed(false);
        loader.style.display = 'none';
        isLoading = false;
      }, 700);
    }
  }, { rootMargin: '300px' }).observe(sentinel);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(d) {
  if (!d) return 'Today';
  try { return new Date(d + 'T12:00:00').toLocaleDateString('en-JM', { month:'short', day:'numeric', year:'numeric' }); }
  catch(_) { return d; }
}

init();
</script>
</body>
</html>
