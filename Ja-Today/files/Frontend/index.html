<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JA Today — Jamaica's Daily News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;600;700;800&family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/ja-today.css">
<script src="js/ja-today.js" defer></script>

</head>



<body>

<div class="bg"></div>
<div class="page">

  <div class="ticker">
    <div class="ticker-label">
      <span class="tl-breaking">Breaking</span>
      <span class="tl-news">News</span>
    </div>
    <div class="ticker-track">
      <div class="ticker-scroll" id="ticker-scroll"></div>
    </div>
  </div>

  <header>
    <div class="header-inner">
      <div class="header-top">
        <a href="ja-today.html" style="text-decoration:none; color:inherit; display:block;">
        <div class="header-flag">
          <div class="flag-bar" style="background:#000;"></div>
          <div class="flag-bar" style="background:var(--gold);"></div>
          <div class="flag-bar" style="background:var(--green);"></div>
        </div>
        </a>
        <span id="date-display"></span>
        <div class="auth-area" id="auth-area"></div>
      </div>
      <div class="wordmark">
        <a href="ja-today.html" style="text-decoration:none; color:inherit; display:block;">
          <h1><span class="ja">JA</span><span class="today"> TODAY</span></h1>
          <div class="wordmark-rule"></div>
          <div class="wordmark-sub">Jamaica's Daily News</div>
        </a>
      </div>
      <div class="cat-nav-wrap" id="cat-nav"></div>
      <div class="header-search">
        <input class="search-input" type="text" placeholder="🔍  Search stories..." oninput="handleSearch(this.value)">
      </div>
    </div>
  </header>

  <div class="feed" id="feed"></div>

  <div class="loader" id="loader" style="display:none;">
    <div class="loader-dots"><span></span><span></span><span></span></div>
    Loading more stories
  </div>

  <footer class="site-footer">
    <a href="ja-today.html" style="text-decoration:none; color:inherit;">
      <div class="footer-logo"><span class="ja">JA</span> TODAY</div>
    </a>
    <div>Jamaica's Daily News &nbsp;·&nbsp; <span id="footer-year"></span></div>
  </footer>
  <!-- BREAKING NEWS BOTTOM BANNER -->
<div id="breaking-banner" style="
  display:none; position:fixed; bottom:0; left:0; right:0;
  background:#0d0f13; border-top:2px solid #d42b2b;
  height:38px; z-index:200; overflow:hidden;
  box-shadow:0 -4px 30px rgba(212,43,43,0.3);
">
  <div style="display:flex; align-items:stretch; height:100%;">
    <div style="
      display:flex; align-items:center; flex-shrink:0;
      font-family:'JetBrains Mono',monospace; font-weight:500;
      font-size:0.6rem; letter-spacing:0.15em; height:100%;
    ">
      <span style="background:var(--gold);color:#000;padding:0 0.7rem 0 1rem;height:100%;display:flex;align-items:center;">Breaking</span>
      <span style="background:#d42b2b;color:#fff;padding:0 1rem;height:100%;display:flex;align-items:center;position:relative;">
        News
        <span style="position:absolute;left:-9px;top:0;bottom:0;width:18px;background:#d42b2b;transform:skewX(-14deg);transform-origin:bottom left;"></span>
      </span>
    </div>
    <div style="flex:1;overflow:hidden;display:flex;align-items:center;">
      <div id="breaking-banner-scroll" style="
        display:flex; white-space:nowrap;
        animation:scroll-ticker 20s linear infinite;
        font-family:'JetBrains Mono',monospace; font-size:0.68rem;
        letter-spacing:0.05em; color:#fff;
      "></div>
    </div>
  </div>
</div>

</div>

</body>
</html>
